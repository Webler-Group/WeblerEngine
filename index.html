<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Collisions Demo</title>
</head>

<body>
    <canvas></canvas>

    <script src="src/utils.js"></script>
    <script src="src/core.js"></script>
    <script src="src/graphics.js"></script>
    <script src="src/input.js"></script>
    <script src="src/physics.js"></script>

    <script>
        const W = 800, H = 500;
        const canvas = document.querySelector("canvas");
        canvas.width = W;
        canvas.height = H;

        const sm = new SceneManager();
        const renderer = new Renderer(canvas);
        renderer.clearColor = "#0d0d1a";

        const im = new InputManager({
            keyboard: true,
            pointer: canvas
        });

        im.addBinding("shape:insert", { device: "pointer", control: "pointer" });

        const GRAVITY = new Vector(0, 500);

        class ShapeManager extends SceneNode {
            constructor(im, camera) {
                super();
                this.im = im;
                this.camera = camera;

                this.handleInsert = (val) => {
                    if (Math.random() < 0.5) {
                        const r = rnd(12, 28);
                        makeCircle(this.scene, val.x, val.y, r, pick(), { camera: this.camera });
                    } else {
                        const w = rnd(30, 60), h = rnd(30, 60);
                        makeBox(this.scene, val.x, val.y, w, h, pick(), { angle: rnd(0, Math.PI * 2), camera: this.camera });
                    }
                }
            }

            start() {
                im.onAction("shape:insert", "start", this.handleInsert);
            }

            destroy() {
                im.offAction("shape:insert", "start", this.handleInsert);
            }
        }

        // ─── Body factories ───────────────────────────────────────────────────

        function makeCircle(scene, x, y, radius, color, params = {}) {
            const { mass = 1, vx = 0, vy = 0, isStatic = false, camera = null } = params;
            const body = new Body({ radius, mass, type: "Circle", restitution: 0.4, friction: 0.5 });
            body.physPos.set(x, y);
            body.position.set(x, y);
            body.vel.set(vx, vy);
            if (isStatic) body.setStatic();
            scene.addNode(body);

            const visual = new CircleDrawable({
                radius, fillColor: color, camera,
                strokeColor: "rgba(255,255,255,0.35)", lineWidth: 2, zIndex: 1,
            });
            visual.setParent(body);
            scene.addNode(visual);
            return body;
        }

        function makeBox(scene, x, y, w, h, color, params = {}) {
            const { mass = 1, vx = 0, vy = 0, angle = 0, isStatic = false, camera = null } = params;
            const hw = w / 2, hh = h / 2;
            const vertices = [
                new Vector(-hw, -hh), new Vector(hw, -hh),
                new Vector(hw, hh), new Vector(-hw, hh),
            ];
            const body = new Body({ vertices, mass, type: "Polygon", restitution: 0.3, friction: 0.6 });
            body.physPos.set(x, y);
            body.position.set(x, y);
            body.physAngle = angle;
            body.angle = angle;
            body.vel.set(vx, vy);
            if (isStatic) body.setStatic();
            scene.addNode(body);

            const visual = new PolygonDrawable({
                vertices, fillColor: color, camera,
                strokeColor: "rgba(255,255,255,0.35)", lineWidth: 2, zIndex: 1,
            });
            visual.setParent(body);
            scene.addNode(visual);
            return body;
        }

        // ─── Scene setup ──────────────────────────────────────────────────────

        const solver = new Solver();

        const COLORS = ["#e74c3c", "#3498db", "#2ecc71", "#f39c12", "#1abc9c", "#e91e63", "#ff5722", "#9b59b6", "#e67e22", "#8bc34a"];

        function rnd(min, max) { return min + Math.random() * (max - min); }
        function pick() { return COLORS[Math.floor(Math.random() * COLORS.length)]; }

        const initScene = (scene) => {
            const T = 15; // wall thickness half

            const camera = new Camera({ viewport: { width: W, height: H } });
            camera.position.set(W / 2, H / 2);
            scene.addNode(camera);

            // Open-top box: bottom, left wall, right wall
            makeBox(scene, W / 2, H - T, W, T * 2, "#616161", { isStatic: true, camera });
            makeBox(scene, T, H / 2, T * 2, H, "#616161", { isStatic: true, camera });
            makeBox(scene, W - T, H / 2, T * 2, H, "#616161", { isStatic: true, camera });

            // Inner bounds for spawning
            const minX = T * 2 + 40, maxX = W - T * 2 - 40;
            const minY = 40, maxY = H - T * 2 - 40;

            // Random circles
            for (let i = 0; i < 8; i++) {
                const r = rnd(12, 28);
                makeCircle(scene, rnd(minX, maxX), rnd(minY, maxY * 0.5), r, pick(), { camera });
            }

            // Random boxes
            for (let i = 0; i < 7; i++) {
                const w = rnd(30, 60), h = rnd(30, 60);
                makeBox(scene, rnd(minX, maxX), rnd(minY, maxY * 0.5), w, h, pick(), { angle: rnd(0, Math.PI), camera });
            }

            const pointerPosControl = new PointerPosition(im.getDevice("pointer"), { camera });
            pointerPosControl.name = "pointer";
            scene.addNode(pointerPosControl);

            const shapeManager = new ShapeManager(im, camera);
            scene.addNode(shapeManager);
        };

        sm.register("Demo", initScene);
        sm.switchScene("Demo");

        // ─── Game loop ────────────────────────────────────────────────────────

        let lastRAF = 0;
        const loop = () => {
            requestAnimationFrame(t => {
                loop();
                t *= 0.001;
                const dt = Math.min((lastRAF ? t - lastRAF : t), 0.05);
                lastRAF = t;

                if (sm.currentScene) {
                    sm.currentScene.update(dt);
                    sm.currentScene.updateWorldTransforms();
                    for (const body of sm.currentScene.findNodesByType(Body)) {
                        if (body.invMass > 0) body.applyForce(GRAVITY.clone().scale(body.mass));
                    }
                    solver.step(sm.currentScene.findNodesByType(Body), dt);
                    sm.currentScene.updateWorldTransforms();
                    renderer.render(sm.currentScene.findNodesByType(Drawable));
                }
            });
        };
        loop();
    </script>
</body>

</html>
