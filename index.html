<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Constraints Demo</title>
</head>

<body>
    <canvas></canvas>

    <script src="src/utils.js"></script>
    <script src="src/core.js"></script>
    <script src="src/graphics.js"></script>
    <script src="src/input.js"></script>
    <script src="src/physics.js"></script>

    <script>
        const W = 1600, H = 700;
        const canvas = document.querySelector("canvas");
        canvas.width = W;
        canvas.height = H;

        const sm = new SceneManager();
        const renderer = new Renderer(canvas);
        renderer.clearColor = "#0d0d1a";

        const im = new InputManager({
            keyboard: true,
            pointer: canvas
        });

        im.addBinding("shape:insert", { device: "pointer",  control: "pointer" });
        im.addBinding("car:left",     { device: "keyboard", control: "KeyA" });
        im.addBinding("car:right",    { device: "keyboard", control: "KeyD" });

        const GRAVITY = new Vector(0, 500);

        class ShapeManager extends SceneNode {
            constructor(im, camera) {
                super();
                this.im = im;
                this.camera = camera;

                this.handleInsert = (val) => {
                    if (Math.random() < 0.5) {
                        const r = rnd(12, 28);
                        makeCircle(this.scene, val.x, val.y, r, pick(), { camera: this.camera });
                    } else {
                        const w = rnd(30, 60), h = rnd(30, 60);
                        makeBox(this.scene, val.x, val.y, w, h, pick(), { angle: rnd(0, Math.PI * 2), camera: this.camera });
                    }
                };
            }

            start() { im.onAction("shape:insert", "start", this.handleInsert); }
            destroy() { im.offAction("shape:insert", "start", this.handleInsert); }
        }

        class CarController extends SceneNode {
            constructor(im, leftWheel, rightWheel) {
                super();
                this.im = im;
                this.leftWheel = leftWheel;
                this.rightWheel = rightWheel;
                this._left  = false;
                this._right = false;
                this._onLeftStart  = () => { this._left  = true;  };
                this._onLeftEnd    = () => { this._left  = false; };
                this._onRightStart = () => { this._right = true;  };
                this._onRightEnd   = () => { this._right = false; };
            }

            start() {
                this.im.onAction("car:left",  "start", this._onLeftStart);
                this.im.onAction("car:left",  "end",   this._onLeftEnd);
                this.im.onAction("car:right", "start", this._onRightStart);
                this.im.onAction("car:right", "end",   this._onRightEnd);
            }

            update(dt) {
                const driveForce  = 1000; // N — applied at wheel top
                const frictionDamp = 5;   // angular velocity decay rate (rad/s per rad/s per second)

                for (const wheel of [this.leftWheel, this.rightWheel]) {
                    // Rolling friction — damps spin whether driving or coasting
                    wheel.angVel *= Math.max(0, 1 - frictionDamp * dt);

                    if (this._left || this._right) {
                        const sign = this._right ? 1 : -1;
                        const r = wheel.radius;
                        // Force at the wheel top: (±F, 0) × r_top=(0,−r)
                        //   torque = −(−r) × (±F) = ±r·F  → clockwise for right, ccw for left
                        wheel.applyForceAtPoint(
                            new Vector(sign * driveForce, 0),
                            new Vector(wheel.physPos.x, wheel.physPos.y - r)
                        );
                    }
                }
            }

            destroy() {
                this.im.offAction("car:left",  "start", this._onLeftStart);
                this.im.offAction("car:left",  "end",   this._onLeftEnd);
                this.im.offAction("car:right", "start", this._onRightStart);
                this.im.offAction("car:right", "end",   this._onRightEnd);
            }
        }

        // ─── Constraint drawables ────────────────────────────────────────────

        class ConstraintDrawable extends Drawable {
            /** @type {DistanceConstraint} */
            constraint;
            /** @type {string} */
            color;
            /** @type {number} */
            lineWidth;

            /**
             * @param {DistanceConstraint} constraint
             * @param {DrawableParams & { color?: string, lineWidth?: number }} params
             */
            constructor(constraint, params = {}) {
                super(params);
                this.constraint = constraint;
                this.color = params.color ?? "rgba(255,255,255,0.65)";
                this.lineWidth = params.lineWidth ?? 2;
            }

            /** @param {CanvasRenderingContext2D} ctx */
            draw(ctx) {
                const c = this.constraint;
                const wA = c.getWorldAnchor(c.bodyA, c.localA);
                const wB = c.getWorldAnchor(c.bodyB, c.localB);
                ctx.beginPath();
                ctx.moveTo(wA.x, wA.y);
                ctx.lineTo(wB.x, wB.y);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(wA.x, wA.y, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(wB.x, wB.y, 3, 0, Math.PI * 2); ctx.fill();
            }
        }

        class SpringConstraintDrawable extends Drawable {
            /** @type {SpringConstraint} */
            constraint;
            /** @type {string} */
            color;
            /** @type {number} */
            lineWidth;
            /** @type {number} */
            coils;

            /**
             * @param {SpringConstraint} constraint
             * @param {DrawableParams & { color?: string, lineWidth?: number, coils?: number }} params
             */
            constructor(constraint, params = {}) {
                super(params);
                this.constraint = constraint;
                this.color = params.color ?? "#f1c40f";
                this.lineWidth = params.lineWidth ?? 2;
                this.coils = params.coils ?? 8;
            }

            /** @param {CanvasRenderingContext2D} ctx */
            draw(ctx) {
                const c = this.constraint;
                const wA = c.getWorldAnchor(c.bodyA, c.localA);
                const wB = c.getWorldAnchor(c.bodyB, c.localB);
                const dx = wB.x - wA.x, dy = wB.y - wA.y;
                const len = Math.hypot(dx, dy);
                if (len < 0.0001) return;
                const ux = dx / len, uy = dy / len; // unit along spring
                const px = -uy,      py = ux;        // unit perpendicular

                const amp = 6;
                const endLen = len * 0.08;
                const coilLen = len - endLen * 2;
                const steps = this.coils * 2;
                const sx = wA.x + ux * endLen, sy = wA.y + uy * endLen;

                ctx.beginPath();
                ctx.moveTo(wA.x, wA.y);
                ctx.lineTo(sx, sy);
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const side = (i % 2 === 0) ? 1 : -1;
                    ctx.lineTo(
                        sx + ux * coilLen * t + px * amp * side,
                        sy + uy * coilLen * t + py * amp * side
                    );
                }
                ctx.lineTo(wB.x, wB.y);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();

                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(wA.x, wA.y, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(wB.x, wB.y, 3, 0, Math.PI * 2); ctx.fill();
            }
        }

        class RopeConstraintDrawable extends Drawable {
            /** @type {RopeConstraint} */
            constraint;
            /** @type {string} */
            color;
            /** @type {number} */
            lineWidth;

            /**
             * @param {RopeConstraint} constraint
             * @param {DrawableParams & { color?: string, lineWidth?: number }} params
             */
            constructor(constraint, params = {}) {
                super(params);
                this.constraint = constraint;
                this.color = params.color ?? "rgba(200,155,80,0.9)";
                this.lineWidth = params.lineWidth ?? 2;
            }

            /** @param {CanvasRenderingContext2D} ctx */
            draw(ctx) {
                const c = this.constraint;
                const wA = c.getWorldAnchor(c.bodyA, c.localA);
                const wB = c.getWorldAnchor(c.bodyB, c.localB);
                const dx = wB.x - wA.x, dy = wB.y - wA.y;
                const dist = Math.hypot(dx, dy);
                const slack = c.maxLength - dist;

                // drop=0 when taut → quadratic bezier degenerates to a straight line.
                // Smoothly droops downward as slack increases.
                const drop = slack > 0 ? Math.min(slack * 0.35, 60) : 0;

                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.lineWidth;
                ctx.beginPath();
                ctx.moveTo(wA.x, wA.y);
                ctx.quadraticCurveTo(
                    (wA.x + wB.x) / 2, (wA.y + wB.y) / 2 + drop,
                    wB.x, wB.y
                );
                ctx.stroke();

                // Chain-link circles only when taut and rope has length
                if (slack <= 2 && dist > 0.5) {
                    const count = Math.floor(dist / 12);
                    ctx.lineWidth = 1;
                    for (let i = 1; i < count; i++) {
                        const t = i / count;
                        ctx.beginPath();
                        ctx.arc(wA.x + dx * t, wA.y + dy * t, 3, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }

                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(wA.x, wA.y, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(wB.x, wB.y, 3, 0, Math.PI * 2); ctx.fill();
            }
        }

        class RevoluteConstraintDrawable extends Drawable {
            /** @type {RevoluteConstraint} */
            constraint;

            /**
             * @param {RevoluteConstraint} constraint
             * @param {DrawableParams} params
             */
            constructor(constraint, params = {}) {
                super(params);
                this.constraint = constraint;
            }

            /** @param {CanvasRenderingContext2D} ctx */
            draw(ctx) {
                const c = this.constraint;
                const wA = c.getWorldAnchor(c.bodyA, c.localA);
                const wB = c.getWorldAnchor(c.bodyB, c.localB);
                const mx = (wA.x + wB.x) / 2, my = (wA.y + wB.y) / 2;
                ctx.strokeStyle = "#ff8800";
                ctx.fillStyle = "#ff8800";
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(mx, my, 7, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.arc(mx, my, 2.5, 0, Math.PI * 2); ctx.fill();
            }
        }

        class AngleConstraintDrawable extends Drawable {
            /** @type {AngleConstraint} */
            constraint;

            /**
             * @param {AngleConstraint} constraint
             * @param {DrawableParams} params
             */
            constructor(constraint, params = {}) {
                super(params);
                this.constraint = constraint;
            }

            /** @param {CanvasRenderingContext2D} ctx */
            draw(ctx) {
                const c = this.constraint;
                const a = c.bodyA, b = c.bodyB;
                ctx.strokeStyle = "rgba(170, 68, 255, 0.6)";
                ctx.lineWidth = 1.5;
                const r = 18;
                // Arc indicator on each body
                ctx.beginPath(); ctx.arc(a.physPos.x, a.physPos.y, r, a.physAngle - 0.4, a.physAngle + 0.4); ctx.stroke();
                ctx.beginPath(); ctx.arc(b.physPos.x, b.physPos.y, r, b.physAngle - 0.4, b.physAngle + 0.4); ctx.stroke();
                // Dashed line connecting the two bodies
                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = "rgba(170, 68, 255, 0.3)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(a.physPos.x, a.physPos.y);
                ctx.lineTo(b.physPos.x, b.physPos.y);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        class AngleLimitConstraintDrawable extends Drawable {
            /** @type {AngleLimitConstraint} */
            constraint;

            /**
             * @param {AngleLimitConstraint} constraint
             * @param {DrawableParams} params
             */
            constructor(constraint, params = {}) {
                super(params);
                this.constraint = constraint;
            }

            /** @param {CanvasRenderingContext2D} ctx */
            draw(ctx) {
                const c = this.constraint;
                const a = c.bodyA;
                const r = 22;
                // Allowed range filled arc
                ctx.fillStyle = "rgba(236, 72, 153, 0.12)";
                ctx.beginPath();
                ctx.moveTo(a.physPos.x, a.physPos.y);
                ctx.arc(a.physPos.x, a.physPos.y, r, a.physAngle + c.minAngle, a.physAngle + c.maxAngle);
                ctx.closePath();
                ctx.fill();
                // Arc outline
                ctx.strokeStyle = "rgba(236, 72, 153, 0.5)";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(a.physPos.x, a.physPos.y, r, a.physAngle + c.minAngle, a.physAngle + c.maxAngle);
                ctx.stroke();
                // Limit edge lines
                ctx.strokeStyle = "rgba(236, 72, 153, 0.4)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(a.physPos.x, a.physPos.y);
                ctx.lineTo(a.physPos.x + r * Math.cos(a.physAngle + c.minAngle), a.physPos.y + r * Math.sin(a.physAngle + c.minAngle));
                ctx.moveTo(a.physPos.x, a.physPos.y);
                ctx.lineTo(a.physPos.x + r * Math.cos(a.physAngle + c.maxAngle), a.physPos.y + r * Math.sin(a.physAngle + c.maxAngle));
                ctx.stroke();
            }
        }

        class MotorConstraintDrawable extends Drawable {
            /** @type {MotorConstraint} */
            constraint;

            /**
             * @param {MotorConstraint} constraint
             * @param {DrawableParams} params
             */
            constructor(constraint, params = {}) {
                super(params);
                this.constraint = constraint;
            }

            /** @param {CanvasRenderingContext2D} ctx */
            draw(ctx) {
                const b = this.constraint.bodyB;
                const speed = this.constraint.speed;
                const r = 18;
                const startAngle = b.physAngle;
                const sweep = speed >= 0 ? Math.PI * 1.4 : -Math.PI * 1.4;
                const endAngle = startAngle + sweep;

                ctx.strokeStyle = "rgba(139, 92, 246, 0.7)";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(b.physPos.x, b.physPos.y, r, startAngle, endAngle, speed < 0);
                ctx.stroke();

                // Arrowhead at end of arc
                const tipX = b.physPos.x + r * Math.cos(endAngle);
                const tipY = b.physPos.y + r * Math.sin(endAngle);
                const tanDir = speed >= 0 ? endAngle + Math.PI / 2 : endAngle - Math.PI / 2;
                ctx.fillStyle = "rgba(139, 92, 246, 0.8)";
                ctx.beginPath();
                ctx.moveTo(tipX, tipY);
                ctx.lineTo(tipX + 5 * Math.cos(tanDir - 0.5), tipY + 5 * Math.sin(tanDir - 0.5));
                ctx.lineTo(tipX + 5 * Math.cos(tanDir + 0.5), tipY + 5 * Math.sin(tanDir + 0.5));
                ctx.closePath();
                ctx.fill();
            }
        }

        // ─── Body & constraint factories ─────────────────────────────────────

        function makeCircle(scene, x, y, radius, color, params = {}) {
            const { mass = 1, vx = 0, vy = 0, isStatic = false, camera = null } = params;
            const body = new Body({ radius, mass, type: "Circle", restitution: 0.4, friction: 0.5 });
            body.physPos.set(x, y);
            body.position.set(x, y);
            body.vel.set(vx, vy);
            if (isStatic) body.setStatic();
            scene.addNode(body);
            const visual = new CircleDrawable({
                radius, fillColor: color, camera,
                strokeColor: "rgba(255,255,255,0.35)", lineWidth: 2, zIndex: 1,
            });
            visual.setParent(body);
            scene.addNode(visual);
            return body;
        }

        function makeBox(scene, x, y, w, h, color, params = {}) {
            const { mass = 1, vx = 0, vy = 0, angle = 0, isStatic = false, camera = null } = params;
            const hw = w / 2, hh = h / 2;
            const vertices = [
                new Vector(-hw, -hh), new Vector(hw, -hh),
                new Vector(hw,   hh), new Vector(-hw,  hh),
            ];
            const body = new Body({ vertices, mass, type: "Polygon", restitution: 0.3, friction: 0.6 });
            body.physPos.set(x, y);
            body.position.set(x, y);
            body.physAngle = angle;
            body.angle = angle;
            body.vel.set(vx, vy);
            if (isStatic) body.setStatic();
            scene.addNode(body);
            const visual = new PolygonDrawable({
                vertices, fillColor: color, camera,
                strokeColor: "rgba(255,255,255,0.35)", lineWidth: 2, zIndex: 1,
            });
            visual.setParent(body);
            scene.addNode(visual);
            return body;
        }

        function makePin(scene, x, y, camera) {
            const body = new Body({ radius: 5, mass: 0, type: "Circle", restitution: 0, friction: 0 });
            body.physPos.set(x, y);
            body.position.set(x, y);
            body.setStatic();
            scene.addNode(body);
            const visual = new CircleDrawable({ radius: 5, fillColor: "#cccccc", camera, zIndex: 2 });
            visual.setParent(body);
            scene.addNode(visual);
            return body;
        }

        function makeConstraint(scene, bodyA, bodyB, localA, localB, camera) {
            const constraint = new DistanceConstraint(bodyA, bodyB, localA, localB);
            scene.addNode(constraint);
            scene.addNode(new ConstraintDrawable(constraint, { camera, zIndex: 0 }));
            return constraint;
        }

        function makeSpring(scene, bodyA, bodyB, localA, localB, options, camera) {
            const constraint = new SpringConstraint(bodyA, bodyB, localA, localB, options);
            scene.addNode(constraint);
            scene.addNode(new SpringConstraintDrawable(constraint, { camera, zIndex: 0 }));
            return constraint;
        }

        function makeRope(scene, bodyA, bodyB, localA, localB, maxLength, camera) {
            const constraint = new RopeConstraint(bodyA, bodyB, localA, localB, maxLength);
            scene.addNode(constraint);
            scene.addNode(new RopeConstraintDrawable(constraint, { camera, zIndex: 0 }));
            return constraint;
        }

        function makeRevolute(scene, bodyA, bodyB, worldAnchor, camera) {
            const constraint = new RevoluteConstraint(bodyA, bodyB, worldAnchor);
            scene.addNode(constraint);
            scene.addNode(new RevoluteConstraintDrawable(constraint, { camera, zIndex: 0 }));
            return constraint;
        }

        function makeAngleConstraint(scene, bodyA, bodyB, camera, targetAngle = null) {
            const constraint = new AngleConstraint(bodyA, bodyB, targetAngle);
            scene.addNode(constraint);
            scene.addNode(new AngleConstraintDrawable(constraint, { camera, zIndex: 0 }));
            return constraint;
        }

        function makeAngleLimitConstraint(scene, bodyA, bodyB, minAngle, maxAngle, camera) {
            const constraint = new AngleLimitConstraint(bodyA, bodyB, minAngle, maxAngle);
            scene.addNode(constraint);
            scene.addNode(new AngleLimitConstraintDrawable(constraint, { camera, zIndex: 0 }));
            return constraint;
        }

        function makeMotor(scene, bodyA, bodyB, speed, maxTorque, camera) {
            const constraint = new MotorConstraint(bodyA, bodyB, speed, maxTorque);
            scene.addNode(constraint);
            scene.addNode(new MotorConstraintDrawable(constraint, { camera, zIndex: 0 }));
            return constraint;
        }

        function makeCar(scene, cx, cy, camera) {
            const cw = 70, ch = 14;   // chassis half-extents
            const offX = 55, offY = 45; // wheel offset from chassis centre
            const wheelR = 24;
            const lz = new Vector(0, 0);
            const opts = { stiffness: 120, damping: 10 }; // restLength auto from initial dist

            // ── Chassis (plain box) ────────────────────────────────────────
            const cverts = [new Vector(-cw,-ch), new Vector(cw,-ch), new Vector(cw,ch), new Vector(-cw,ch)];
            const chassis = new Body({ vertices: cverts, mass: 8, type: "Polygon", restitution: 0.1, friction: 0.5 });
            chassis.physPos.set(cx, cy); chassis.position.set(cx, cy);
            scene.addNode(chassis);
            const chassisVis = new PolygonDrawable({ vertices: cverts, fillColor: "#546e7a", strokeColor: "rgba(255,255,255,0.35)", lineWidth: 2, camera, zIndex: 2 });
            chassisVis.setParent(chassis); scene.addNode(chassisVis);

            // ── Wheels ─────────────────────────────────────────────────────
            function makeWheelAt(wx) {
                const wheel = new Body({ radius: wheelR, mass: 1.5, type: "Circle", restitution: 0.2, friction: 1.0 });
                wheel.physPos.set(wx, cy + offY); wheel.position.set(wx, cy + offY);
                scene.addNode(wheel);
                const vis = new CircleDrawable({ radius: wheelR, fillColor: "#37474f", strokeColor: "#78909c", lineWidth: 3, camera, zIndex: 2 });
                vis.setParent(wheel); scene.addNode(vis);
                return wheel;
            }

            const leftWheel  = makeWheelAt(cx - offX);
            const rightWheel = makeWheelAt(cx + offX);

            // ── Two springs per wheel forming a V from the chassis bottom ──
            // Inner anchor directly above wheel; outer anchor at chassis corner.
            // restLength is captured automatically from the initial positions.
            makeConstraint(scene, chassis, leftWheel,  new Vector(-offX, ch), lz, camera);
            makeConstraint(scene, chassis, leftWheel,  new Vector(-cw,   ch), lz, camera);
            makeConstraint(scene, chassis, rightWheel, new Vector( offX, ch), lz, camera);
            makeConstraint(scene, chassis, rightWheel, new Vector( cw,   ch), lz, camera);

            // Wheels don't collide with each other (solver already excludes chassis↔wheel via SpringConstraint)
            solver.excludeCollision(leftWheel, rightWheel);

            return { leftWheel, rightWheel };
        }

        // ─── Scene setup ──────────────────────────────────────────────────────

        const solver = new Solver();

        const COLORS = ["#e74c3c","#3498db","#2ecc71","#f39c12","#1abc9c","#e91e63","#ff5722","#9b59b6","#e67e22","#8bc34a"];

        function rnd(min, max) { return min + Math.random() * (max - min); }
        function pick() { return COLORS[Math.floor(Math.random() * COLORS.length)]; }

        const initScene = (scene) => {
            const T = 15;

            const camera = new Camera({ viewport: { width: W, height: H } });
            camera.position.set(W / 2, H / 2);
            scene.addNode(camera);

            const zero = new Vector(0, 0);

            // Closed box walls
            makeBox(scene, W / 2, H - T, W,    T * 2, "#616161", { isStatic: true, camera });
            makeBox(scene, T,     H / 2, T * 2, H,    "#616161", { isStatic: true, camera });
            makeBox(scene, W - T, H / 2, T * 2, H,    "#616161", { isStatic: true, camera });
            makeBox(scene, W / 2, T,     W,    T * 2, "#616161", { isStatic: true, camera });

            // ── Distance Constraints ──────────────────────────────────────────

            // 3-link pendulum chain
            const pin1 = makePin(scene, 155, 50, camera);
            const dball1 = makeCircle(scene, 210, 165, 16, "#e74c3c",  { mass: 2,   camera });
            const dball2 = makeCircle(scene, 255, 300, 16, "#e91e63",  { mass: 2,   camera });
            const dball3 = makeCircle(scene, 215, 435, 13, "#ff5722",  { mass: 1.5, camera });
            makeConstraint(scene, pin1,   dball1, zero, zero, camera);
            makeConstraint(scene, dball1, dball2, zero, zero, camera);
            makeConstraint(scene, dball2, dball3, zero, zero, camera);

            // Platform suspended by two rods from two pins
            const pin2     = makePin(scene, 295, 50, camera);
            const pin3     = makePin(scene, 375, 50, camera);
            const platform = makeBox(scene, 335, 225, 80, 22, "#3498db", { mass: 5, camera });
            makeConstraint(scene, pin2, platform, zero, new Vector(-30, -11), camera);
            makeConstraint(scene, pin3, platform, zero, new Vector( 30, -11), camera);
            makeCircle(scene, 335, 130, 13, "#9b59b6", { mass: 1.5, camera });

            // ── Spring Constraints (x: 403–797) ──────────────────────────────

            // Two balls hanging from ceiling springs, connected by a horizontal spring
            const pin4  = makePin(scene, 510, 50, camera);
            const pin5  = makePin(scene, 690, 50, camera);
            const sball1 = makeCircle(scene, 510, 240, 16, "#2ecc71", { mass: 2, camera });
            const sball2 = makeCircle(scene, 690, 240, 16, "#1abc9c", { mass: 2, camera });
            makeSpring(scene, pin4,  sball1, zero, zero, { stiffness: 100, damping: 6, restLength: 160 }, camera);
            makeSpring(scene, pin5,  sball2, zero, zero, { stiffness: 100, damping: 6, restLength: 160 }, camera);
            makeSpring(scene, sball1, sball2, zero, zero, { stiffness: 55,  damping: 4, restLength: 180 }, camera);

            // Box suspended by two springs — ball dropped onto it
            const pin6 = makePin(scene, 540, 50, camera);
            const pin7 = makePin(scene, 660, 50, camera);
            const sbox = makeBox(scene, 600, 430, 90, 22, "#e67e22", { mass: 6, camera });
            makeSpring(scene, pin6, sbox, zero, new Vector(-35, -11), { stiffness: 140, damping: 9, restLength: 360 }, camera);
            makeSpring(scene, pin7, sbox, zero, new Vector( 35, -11), { stiffness: 140, damping: 9, restLength: 360 }, camera);
            makeCircle(scene, 600, 290, 14, "#f39c12", { mass: 2, vx: 45, camera });

            // ── Rope Constraints (x: 803–1197) ───────────────────────────────
            // Ropes are one-sided: they only pull when taut (dist >= maxLength).
            // Unlike distance rods, the distance is free to shrink below maxLength.

            // A: Free-fall then snap — ball starts very close to pin (big slack),
            //    falls freely while rope droops, snaps taut and swings.
            const pin8   = makePin(scene, 855, 50, camera);
            const rball1 = makeCircle(scene, 855, 90, 15, "#e74c3c", { mass: 2, camera });
            makeRope(scene, pin8, rball1, zero, zero, 240, camera);

            // B: Rope bridge — left and right static anchors; 3 hanging nodes
            //    connected by ropes slightly longer than the gap so they sag
            //    into a catenary. Shows ropes allow distance < maxLength.
            const bridgeL = makePin(scene, 930, 100, camera);
            const bridgeR = makePin(scene, 1110, 100, camera);
            const bnode1  = makeBox(scene, 975,  130, 22, 10, "#3498db", { mass: 1.5, camera });
            const bnode2  = makeBox(scene, 1020, 130, 22, 10, "#2980b9", { mass: 1.5, camera });
            const bnode3  = makeBox(scene, 1065, 130, 22, 10, "#1a6fa0", { mass: 1.5, camera });
            // Segment length ~54px for ~45px gap (20% slack)
            makeRope(scene, bridgeL, bnode1,  zero, zero, 54, camera);
            makeRope(scene, bnode1,  bnode2,  zero, zero, 54, camera);
            makeRope(scene, bnode2,  bnode3,  zero, zero, 54, camera);
            makeRope(scene, bnode3,  bridgeR, zero, zero, 54, camera);

            // C: 2-link chain — bottom link given lateral velocity; inner link
            //    visibly droops slack when swinging inward, snaps straight outward.
            const pin10  = makePin(scene, 1160, 50, camera);
            const rball3 = makeCircle(scene, 1160, 190, 13, "#9b59b6", { mass: 1.5, camera });
            const rball4 = makeCircle(scene, 1160, 350, 13, "#8bc34a", { mass: 1.5, vx: 130, camera });
            makeRope(scene, pin10,  rball3, zero, zero, 150, camera);
            makeRope(scene, rball3, rball4, zero, zero, 165, camera);

            // ── Joint Constraints (x: 1203–1585) ─────────────────────────────

            // 1: Revolute hinge — arm swings freely around a fixed pin
            const rev_pin = makePin(scene, 1255, 80, camera);
            const rev_arm = makeBox(scene, 1255, 140, 16, 120, "#e74c3c", { mass: 3, camera });
            makeRevolute(scene, rev_pin, rev_arm, new Vector(1255, 80), camera);

            // 2: Motor — spinning wheel driven by a motor on a fixed axle;
            //    small marker circle shows the rotation.
            const mot_axle = makePin(scene, 1360, 310, camera);
            const mot_wheel = makeCircle(scene, 1360, 310, 42, "#3498db", { mass: 6, camera });
            const mot_marker = makeCircle(scene, 1395, 310, 6, "#ffffff", { mass: 0.01, camera });
            makeRevolute(scene, mot_axle, mot_wheel,  new Vector(1360, 310), camera);
            makeRevolute(scene, mot_wheel, mot_marker, new Vector(1395, 310), camera);
            makeMotor(scene, mot_axle, mot_wheel, 4, 3000, camera);

            // 3: Angle limit — two-link arm with elbow joint stops at ±100°
            const al_pin   = makePin(scene, 1470, 80, camera);
            const al_upper = makeBox(scene, 1470, 135, 14, 110, "#f39c12", { mass: 2, camera });
            const al_lower = makeBox(scene, 1470, 240, 14, 100, "#e67e22", { mass: 2, camera });
            makeRevolute(scene, al_pin,   al_upper, new Vector(1470, 80),  camera);
            makeRevolute(scene, al_upper, al_lower, new Vector(1470, 190), camera);
            makeAngleLimitConstraint(scene, al_upper, al_lower, -Math.PI * 5 / 9, Math.PI * 5 / 9, camera);

            // 4: Angle constraint — two pendulums forced to keep the same
            //    relative rotation; push one and the other spins in sync.
            const ac_pin1  = makePin(scene, 1530, 80, camera);
            const ac_pin2  = makePin(scene, 1565, 80, camera);
            const ac_ball1 = makeBox(scene, 1510, 240, 28, 16, "#9b59b6", { mass: 2, vx: -90, camera });
            const ac_ball2 = makeBox(scene, 1565, 240, 28, 16, "#1abc9c", { mass: 2, camera });
            makeConstraint(scene, ac_pin1, ac_ball1, zero, zero, camera);
            makeConstraint(scene, ac_pin2, ac_ball2, zero, zero, camera);
            makeAngleConstraint(scene, ac_ball1, ac_ball2, camera);

            // ── Car (x: 1203–1585, lower half) — A/D to drive ────────────────
            const { leftWheel, rightWheel } = makeCar(scene, 1390, 450, camera);
            const carCtrl = new CarController(im, leftWheel, rightWheel);
            scene.addNode(carCtrl);

            const pointerPosControl = new PointerPosition(im.getDevice("pointer"), { camera });
            pointerPosControl.name = "pointer";
            scene.addNode(pointerPosControl);

            const shapeManager = new ShapeManager(im, camera);
            scene.addNode(shapeManager);
        };

        sm.register("Demo", initScene);
        sm.switchScene("Demo");

        // ─── Game loop ────────────────────────────────────────────────────────

        let lastRAF = 0;
        const loop = () => {
            requestAnimationFrame(t => {
                loop();
                t *= 0.001;
                const dt = Math.min((lastRAF ? t - lastRAF : t), 0.05);
                lastRAF = t;

                if (sm.currentScene) {
                    sm.currentScene.update(dt);
                    sm.currentScene.updateWorldTransforms();
                    for (const body of sm.currentScene.findNodesByType(Body)) {
                        if (body.invMass > 0) body.applyForce(GRAVITY.clone().scale(body.mass));
                    }
                    solver.step(
                        sm.currentScene.findNodesByType(Body),
                        sm.currentScene.findNodesByType(Constraint),
                        dt
                    );
                    sm.currentScene.updateWorldTransforms();
                    renderer.render(sm.currentScene.findNodesByType(Drawable));
                }
            });
        };
        loop();
    </script>
</body>
